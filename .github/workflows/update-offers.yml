name: Update Tracked Broadband Offers

on:
  schedule:
    # Run once daily at 4:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-offers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Execute Provider Offers Crawler System
        run: npx tsx scripts/update-provider-offers.js

      - name: Commit and Push Tracked Updates
        run: |
          git config --global user.name "Github Actions System"
          git config --global user.email "actions@github.com"
          git add src/data/liveOffers.json src/data/providerAvailability.json src/data/sourceUpdateLogs.json
          if ! git diff --cached --quiet; then
            git commit -m "Update tracked broadband offers"
            git push origin main
          else
            echo "No changes found in tracked provider listings. Skipping repository commit."
          fi
